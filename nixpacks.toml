[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate",
  "pip install --upgrade pip",
  "pip install -r requirements.txt"
]

[phases.build]
cmds = [
  ". /opt/venv/bin/activate",
  "python manage.py collectstatic --noinput",
  "python manage.py migrate"
]

[start]
cmd = ". /opt/venv/bin/activate && cd /app && PYTHONPATH=/app gunicorn Airyrides.wsgi:application --bind 0.0.0.0:$PORT --workers ${WEB_CONCURRENCY:-2} --timeout 120 --log-level info"
